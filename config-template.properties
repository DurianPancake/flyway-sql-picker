# SQL root directory (relative path or absolute path are both supported)
sql.root=./sql

# Database segment in path, e.g. mysql / postgresql / oracle / sqlserver
db.name=mysql

# ALL or VERSIONS
selection.mode=VERSIONS

# Used only when selection.mode=VERSIONS, comma-separated (case-insensitive contains match)
# Example: V10.x,V9.0SP1
selection.versions=V10.x

# Output merged SQL file path
output.file=./out/merged.sql

# Write file header comment for each merged SQL source file
output.includeFileHeader=true
